<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의 상세</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<div class="admin_wrap">

    <aside class="admin_sidebar">
        <h2>
            <a href="{{ url_for('admin.admin_main') }}" class="admin_title">관리자</a>
        </h2>
        <ul>
            <li><a href="{{ url_for('admin.member_list') }}">회원 관리</a></li>
            <li><a href="{{ url_for('admin.content_list') }}">콘텐츠 관리</a></li>
            <li><a href="{{ url_for('admin.inquiry_list') }}" class="active">문의 관리</a></li>
            <li><a href="{{ url_for('admin.review_list') }}">리뷰 관리</a></li>
        </ul>
    </aside>

    <main class="admin_content">
        <h1>문의 상세</h1>

        <div class="content_form">

            <div class="content_form_group">
                <label>번호</label>
                <input type="text" value="{{ inquiry.support_id }}" readonly>
            </div>

            <div class="content_form_group">
                <label>사용자 이메일</label>
                <input type="text"
                       value="{{ inquiry.user.user_email if inquiry.user and inquiry.user.user_email else '-' }}"
                       readonly>
            </div>

            <div class="content_form_group">
                <label>카테고리</label>
                <input type="text" value="{{ inquiry.category if inquiry.category else '-' }}" readonly>
            </div>

            <div class="content_form_group">
                <label>제목</label>
                <input type="text" value="{{ inquiry.title if inquiry.title else '-' }}" readonly>
            </div>

            <div class="content_form_group">
                <label>문의 내용</label>
                <textarea readonly>{{ inquiry.content if inquiry.content else '-' }}</textarea>
            </div>

            <div class="content_form_group">
                <label>현재 상태</label>
                <input type="text"
                       value="{% if inquiry.status == 'pending' %}답변 전{% elif inquiry.status == 'completed' %}답변 완료{% else %}-{% endif %}"
                       readonly>
            </div>

            <div class="content_form_group">
                <label>작성일</label>
                <input type="text"
                       value="{{ inquiry.created_at.strftime('%Y-%m-%d %H:%M') if inquiry.created_at else '-' }}"
                       readonly>
            </div>

        </div>

        <form method="post" class="content_form" style="margin-top: 20px;">

            <div class="content_form_group">
                <label>답변 작성</label>
                <textarea name="answer_content" placeholder="답변 내용을 입력하세요"></textarea>
            </div>

            <div class="content_form_actions">
                <button type="submit" class="content_save_btn">저장</button>
                <a href="{{ url_for('admin.inquiry_list') }}" class="content_cancel_btn">목록으로</a>
            </div>

        </form>

        {% if inquiry.answers %}
        <div class="content_form" style="margin-top: 20px;">
            <h3 style="margin-bottom: 15px; color: red;">답변 내역</h3>

            {% for answer in inquiry.answers %}
            <div class="answer_box">

                <p><strong>답변 내용</strong></p>
                <p>{{ answer.content if answer.content else '-' }}</p>

                <p style="margin-top: 10px; color: #aaa;">
                    작성일: {{ answer.created_at.strftime('%Y-%m-%d %H:%M') if answer.created_at else '-' }}
                </p>

                <div class="answer_actions">
                    <a href="{{ url_for('admin.inquiry_answer_edit', answer_id=answer.answer_id) }}"
                       class="content_action_btn content_edit_btn">수정</a>

                    <form action="{{ url_for('admin.inquiry_answer_delete', answer_id=answer.answer_id) }}"
                          method="post"
                          class="content_delete_form"
                          onsubmit="return confirm('이 답변을 삭제하시겠습니까?');">
                        <button type="submit" class="content_action_btn content_delete_btn">삭제</button>
                    </form>
                </div>

            </div>
            {% endfor %}
        </div>
        {% endif %}
    </main>

</div>

</body>
</html>
