<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">

<header class="header navbar sticky-top">
    <div class="container-fluid d-flex align-items-center justify-content-between">

        <!-- 로고 -->
        <a class="navbar-brand text-white" href="{{ url_for('home.index') }}">
            <img class="logo"
                 src="{{ url_for('static', filename='img/logo.png') }}"
                 alt="logo">
        </a>

        {% if request.endpoint == 'home.index' %}
        {% if current_user.is_authenticated %}
        <a href="{{ url_for('auth.logout') }}" class="btn btn-danger ms-3">
            로그아웃
        </a>
        {% else %}
        <a href="{{ url_for('auth.login') }}" class="btn btn-danger ms-3">
            로그인
        </a>
        {% endif %}
        {% endif %}

    </div>
</header>
