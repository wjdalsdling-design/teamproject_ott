<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4FLEX</title>

    <!-- 부트스트랩 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
</head>
<body>

<!-------------------------------------- 헤더 --------------------------------------->
 {% include 'header.html' %}
<!--------------------------------- 메인 배너 ----------------------------------->
<section class="banner">
    <div class="overlay"></div>

    <div class="banner_content container position-relative text-center">
        <h1><b>4FLEX</b> 만의 특별한 혜택<br>오직 <b>4FLEX</b> 에서만</h1>
        <p class="text1">7,000원으로 시작해보세요. 멤버십은 언제든지 해지 가능합니다.</p>
        <p class="text2">시청할 준비가 되셨나요? 이메일 주소를 입력하세요.</p>

        <div class="row justify-content-center g-2 email_row">
            <div class="col-12 col-md-6 col-lg-5">
                <input type="email" class="form-control email_input" placeholder="이메일 주소">
            </div>
            <div class="col-12 col-md-auto">
                <button class="btn btn-danger start_btn">시작하기 &gt;</button>
            </div>
        </div>
    </div>
</section>

<!------------------------------------- 콘텐츠 1 ---------------------------------->
<section class="content_section container">
    <h2 class="mb-4">지금 뜨는 콘텐츠</h2>

    <ul class="row g-4 list-unstyled">
        <li class="col-6 col-md-4 col-lg">
            <div class="content_card1"></div>
        </li>
        <li class="col-6 col-md-4 col-lg">
            <div class="content_card1"></div>
        </li>
        <li class="col-6 col-md-4 col-lg">
            <div class="content_card1"></div>
        </li>
        <li class="col-6 col-md-6 col-lg">
            <div class="content_card1"></div>
        </li>
        <li class="col-6 col-md-6 col-lg">
            <div class="content_card1"></div>
        </li>
    </ul>
</section>

<!------------------------------------- 콘텐츠 2 ---------------------------------->
<section class="content_section container">
    <h2 class="mb-4">가입해야 하는 또 다른 이유</h2>

    <ul class="row g-4 list-unstyled">
        <li class="col-12 col-md-6 col-lg-3">
            <div class="content_card2"><img src="../.././static/img/reason1.png" alt="reason1.png"></div>
        </li>
        <li class="col-12 col-md-6 col-lg-3">
            <div class="content_card2"><img src="../.././static/img/reason2.png" alt="reason2.png"></div>
        </li>
        <li class="col-12 col-md-6 col-lg-3">
            <div class="content_card2"><img src="../.././static/img/reason3.png" alt="reason3.png"></div>
        </li>
        <li class="col-12 col-md-6 col-lg-3">
            <div class="content_card2"><img src="../.././static/img/reason4.png" alt="reason4.png"></div>
        </li>
    </ul>
</section>

<!--------------------------------------- 푸터 ---------------------------------->
{% include 'footer.html'%}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<!--------------------------------------- 로그아웃 ---------------------------------->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        const messages = [
            {% for category, message in get_flashed_messages(with_categories=true) %}
                {
                    text: "{{ message }}",
                    type: "{{ category }}"
                },
            {% endfor %}
        ];

        messages.forEach(msg => {
            Swal.fire({
                toast: true,
                position: 'top-end',

                title: msg.text,

                showConfirmButton: false,
                timer: 2200,
                timerProgressBar: true,

                background: '#2a2a2a',
                color: '#fff',

                customClass: {
                    popup: 'netflixst-toast'
                },

                showClass: {
                    popup: 'animate-toast-in'
                },
                hideClass: {
                    popup: 'animate-toast-out'
                }
            });
        });

    });
</script>
</body>
</html>
